  <!-- WebSite schema — enables Google Sitelinks search box -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Tech In My Style",
    "url": "https://techinmystyle.com",
    "description": "Free programming courses in HTML, CSS, JavaScript, Python, Java, AI, Machine Learning, Data Science and more.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://techinmystyle.com/courses?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

<body>
  <!-- Apply saved theme before React renders to prevent flash -->
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
